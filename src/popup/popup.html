<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1c1e21;
      background: #e9edf2;
      padding: 10px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 2px 10px;
    }
    .header h1 {
      margin: 0;
      line-height: 0;
    }
    .truly-badge {
      display: inline-flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid transparent;
      border-radius: 5px;
      padding: 4px 12px 4px 10px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.42) inset,
        0 1px 2px rgba(14, 23, 38, 0.07);
    }
    .truly-badge .truly-wordmark {
      height: 18px;
      width: auto;
      display: block;
    }
    .truly-badge .truly-wordmark circle {
      transform: translate(-18px, -8px);
    }
    .popup-card {
      padding: 12px;
      border: 1px solid #d8dee7;
      border-radius: 10px;
      background: #fff;
      box-shadow:
        0 1px 2px rgba(15, 23, 42, 0.08),
        0 0 0 1px rgba(255, 255, 255, 0.55) inset;
    }
    .readiness {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .readiness-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .readiness-title {
      font-size: 14px;
      font-weight: 700;
      color: #1c1e21;
      line-height: 1.25;
    }
    .readiness-detail {
      font-size: 12px;
      line-height: 1.4;
      color: #65676b;
    }
    .readiness-detail-row {
      display: flex;
      align-items: flex-start;
      gap: 2px;
      flex-wrap: wrap;
    }
    .readiness-detail-row .readiness-detail { flex: 0 1 auto; }
    .info-toggle {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #65676b;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .info-toggle[hidden] { display: none; }
    .info-toggle:hover { color: #1c1e21; }
    .info-toggle:focus-visible {
      outline: 2px solid #1877f2;
      outline-offset: 1px;
    }
    .info-icon { width: 14px; height: 14px; }
    .unsupported-detail {
      font-size: 12px;
      line-height: 1.4;
      color: #65676b;
      margin-top: 2px;
    }
    .unsupported-detail[hidden] { display: none; }
    .feature-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .feature-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #eef2f6;
      color: #1c1e21;
    }
    .feature-pill .feature-mark { font-weight: 700; line-height: 1; }
    .feature-pill-ok .feature-mark { color: #31a24c; }
    .feature-pill-slow {
      background: #fdeccb;
      color: #7c5e12;
    }
    .feature-pill-slow .feature-mark { color: #d68f00; }
    .feature-pill-off { color: #8a8d91; }
    .feature-pill-off .feature-mark { color: #8a8d91; }
    .feature-pill-failed {
      background: #fce8ea;
      color: #a3243b;
    }
    .feature-pill-failed .feature-mark { color: #e41e3f; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8a8d91;
      flex: 0 0 auto;
    }
    .status-dot.ok { background: #31a24c; }
    .status-dot.warn { background: #f7b928; }
    .status-dot.off { background: #8a8d91; }
    .status-dot.checking {
      width: 14px;
      height: 14px;
      background: transparent;
      border: 2px solid rgba(24, 119, 242, 0.22);
      border-top-color: #1877f2;
      animation: popup-status-spin 850ms linear infinite;
    }
    @keyframes popup-status-spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .status-dot.checking { animation: none; }
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      padding-top: 8px;
    }
    .action-btn {
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid #dadde1;
      background: #fff;
      color: #1c1e21;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 650;
      line-height: 1.2;
    }
    .action-btn.primary {
      flex: 0 0 auto;
      background: color-mix(in srgb, #1877f2 7%, #fff);
      border-color: color-mix(in srgb, #1877f2 32%, #dadde1);
      color: #1877f2;
    }
    .action-btn.secondary {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-color: #dadde1;
      color: #4b5563;
      background: #fff;
    }
    .action-icon {
      width: 13px;
      height: 13px;
      flex: 0 0 auto;
    }
    .sidebar-icon-close,
    .action-btn[data-sidepanel-open="true"] .sidebar-icon-open {
      display: none;
    }
    .action-btn[data-sidepanel-open="true"] .sidebar-icon-close {
      display: block;
    }
    .action-btn:hover { background: #eef2f6; }
    .action-btn.primary:hover {
      background: color-mix(in srgb, #1877f2 11%, #fff);
      border-color: color-mix(in srgb, #1877f2 44%, #dadde1);
    }
    .action-btn.secondary:hover {
      border-color: #dadde1;
      background: #f5f6f7;
    }
    .action-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .action-btn.primary:disabled,
    .action-btn.primary:disabled:hover {
      background: #f5f6f7;
      border-color: #dadde1;
      color: #8a8d91;
    }
    .toggle-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #65676b;
      font-size: 12px;
      font-weight: 600;
    }
    .toggle-switch {
      position: relative;
      width: 34px;
      height: 20px;
    }
    .toggle-switch input {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
    }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #dadde1;
      border-radius: 999px;
      cursor: pointer;
      transition: background 200ms;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 200ms;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #1877f2;
    }
    .toggle-switch input:checked + .toggle-slider::after {
      transform: translateX(14px);
    }
    .toggle-switch input:focus-visible + .toggle-slider {
      outline: 2px solid #1877f2;
      outline-offset: 2px;
    }
    html[data-truly-theme="dark"] body {
      color: #e4e6eb;
      background: #18191a;
    }
    html[data-truly-theme="dark"] .header {
      padding-bottom: 8px;
    }
    html[data-truly-theme="dark"] .truly-badge {
      background: #e7ebf0;
      border-color: transparent;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.38) inset,
        0 2px 4px rgba(0, 0, 0, 0.10);
    }
    html[data-truly-theme="dark"] .truly-badge .truly-wordmark {
      height: 18px;
    }
    html[data-truly-theme="dark"] .popup-card {
      padding: 12px 11px 12px;
      background: #1f2021;
      border-color: rgba(255, 255, 255, 0.13);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset;
    }
    html[data-truly-theme="dark"] .readiness {
      gap: 8px;
    }
    html[data-truly-theme="dark"] .readiness-heading {
      gap: 6px;
    }
    html[data-truly-theme="dark"] .readiness-title,
    html[data-truly-theme="dark"] .action-btn,
    html[data-truly-theme="dark"] .toggle-control {
      color: #e4e6eb;
    }
    html[data-truly-theme="dark"] .readiness-title {
      color: #aeb4bd;
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0;
    }
    html[data-truly-theme="dark"] .readiness-detail,
    html[data-truly-theme="dark"] .unsupported-detail {
      color: #aeb4bd;
    }
    html[data-truly-theme="dark"] .toggle-control {
      gap: 6px;
      color: #c9ced6;
      font-size: 11px;
      font-weight: 650;
    }
    html[data-truly-theme="dark"] .toggle-switch {
      width: 30px;
      height: 18px;
    }
    html[data-truly-theme="dark"] .toggle-slider {
      background: #3a3b3c;
    }
    html[data-truly-theme="dark"] .toggle-slider::after {
      width: 14px;
      height: 14px;
      background: #f5f7fa;
    }
    html[data-truly-theme="dark"] .toggle-switch input:checked + .toggle-slider {
      background: #1877f2;
    }
    html[data-truly-theme="dark"] .toggle-switch input:checked + .toggle-slider::after {
      transform: translateX(12px);
    }
    html[data-truly-theme="dark"] .action-btn {
      min-height: 26px;
      padding: 4px 9px;
      background: #1f2021;
      border-color: rgba(255, 255, 255, 0.14);
      font-size: 11px;
    }
    html[data-truly-theme="dark"] .action-btn:hover {
      background: #2a2b2d;
    }
    html[data-truly-theme="dark"] .action-btn.primary {
      background: rgba(69, 153, 255, 0.08);
      border-color: rgba(69, 153, 255, 0.30);
      color: #9dc9ff;
      font-weight: 650;
    }
    html[data-truly-theme="dark"] .action-btn.primary:hover {
      background: rgba(69, 153, 255, 0.13);
      border-color: rgba(69, 153, 255, 0.42);
    }
    html[data-truly-theme="dark"] .action-btn.secondary {
      padding: 4px 8px;
      color: #c9ced6;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.16);
    }
    html[data-truly-theme="dark"] .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.22);
    }
    html[data-truly-theme="dark"] .info-toggle { color: #b0b3b8; }
    html[data-truly-theme="dark"] .info-toggle:hover { color: #e4e6eb; }
    html[data-truly-theme="dark"] .feature-pill {
      gap: 5px;
      padding: 2px 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #d7dbe2;
      font-size: 11px;
      font-weight: 650;
    }
    html[data-truly-theme="dark"] .feature-pill-ok .feature-mark {
      color: #45bd62;
    }
    html[data-truly-theme="dark"] .feature-pill-slow {
      background: rgba(255, 255, 255, 0.08);
      color: #d7dbe2;
    }
    html[data-truly-theme="dark"] .feature-pill-slow .feature-mark { color: #f7b928; }
    html[data-truly-theme="dark"] .feature-pill-off { color: #8a8d91; }
    html[data-truly-theme="dark"] .feature-pill-off .feature-mark { color: #8a8d91; }
    html[data-truly-theme="dark"] .feature-pill-failed {
      background: rgba(228, 30, 63, 0.2);
      color: #f5a3b0;
    }
    html[data-truly-theme="dark"] .feature-pill-failed .feature-mark { color: #fa5a73; }
  </style>
</head>
