<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Truly GitHub Social Preview</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #080b10;
        color: #f8fafc;
        font-family: "Avenir Next", Aptos, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      main {
        width: min(1380px, calc(100vw - 48px));
        margin: 32px auto 56px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 22px;
        color: #a9b1bd;
        font-size: 14px;
      }
      .grid {
        display: grid;
        gap: 24px;
      }
      article {
        border: 1px solid #2d3440;
        border-radius: 18px;
        background: #11161d;
        padding: 16px;
      }
      article h2 {
        margin: 0 0 12px;
        color: #dce4ef;
        font-size: 17px;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #303846;
        border-radius: 14px;
        background: #0b1118;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Truly GitHub Social Preview</h1>
      <p>1280x640 source previews. Use one final image in GitHub repository settings.</p>
      <section class="grid">
        <article>
          <h2>en</h2>
          <img src="truly-github-social-en.svg" alt="Truly GitHub social preview en">
        </article><article>
          <h2>bilingual</h2>
          <img src="truly-github-social-bilingual.svg" alt="Truly GitHub social preview bilingual">
        </article><article>
          <h2>zh-tw</h2>
          <img src="truly-github-social-zh-tw.svg" alt="Truly GitHub social preview zh-tw">
        </article>
      </section>
    </main>
  </body>
</html>
