<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Truly README Demo GIFs</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080b10;
        --panel: #11161d;
        --line: #2d3440;
        --text: #f2f5f9;
        --muted: #a9b1bd;
        --blue: #60a5fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Avenir Next", Aptos, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .page {
        width: min(1360px, calc(100vw - 40px));
        margin: 32px auto 56px;
      }

      .intro {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      .note {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .variants {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 18px;
        max-width: 960px;
      }

      .variant {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 14px;
      }

      .variant h2 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 6px;
        font-size: 15px;
      }

      .tag {
        border-radius: 999px;
        background: rgba(96, 165, 250, 0.14);
        color: #93c5fd;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 800;
      }

      .variant p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #303846;
        border-radius: 14px;
        background: #0b0f15;
      }

      @media (max-width: 980px) {
        .variants {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="intro">
        <div>
          <h1>Truly README demo GIFs</h1>
        <p class="note">Synthetic README demo. No real posts or identities.</p>
        </div>
        <p class="note">Generated by <code>scripts/render-readme-demo.mjs</code></p>
      </div>

      <section class="variants">
        <article class="variant">
          <h2>Balanced <span class="tag">current</span></h2>
          <p>Current README default. Facebook-like feed, expanded hint, and side panel handoff.</p>
          <img src="truly-demo-balanced.gif" alt="Balanced Truly README demo GIF">
        </article>
      </section>
    </main>
  </body>
</html>
